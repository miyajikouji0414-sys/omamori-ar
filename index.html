<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お守りARフレーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#1a0a00;min-height:100vh;font-family:'Noto Serif JP',serif;display:flex;flex-direction:column;align-items:center;}

  header{width:100%;max-width:480px;padding:16px;text-align:center;border-bottom:1px solid rgba(212,149,10,0.3);}
  header h1{color:#F5C842;font-size:18px;font-weight:700;letter-spacing:3px;}
  header p{color:rgba(245,200,66,0.6);font-size:11px;margin-top:4px;letter-spacing:1px;}

  #app{width:100%;max-width:480px;padding:16px;}
  .hidden{display:none!important;}

  /* ===== TOP SCREEN ===== */
  #screen-top{}
  .pick-label{color:#F5C842;font-size:13px;text-align:center;letter-spacing:2px;margin-bottom:14px;opacity:0.85;}
  #qr-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .qr-card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(212,149,10,0.4);
    border-radius:12px;padding:14px 10px;
    text-align:center;cursor:pointer;
    transition:border-color .2s, background .2s;
    width:130px;
  }
  .qr-card:hover{border-color:#F5C842;background:rgba(212,149,10,0.08);}
  .qr-card:active{transform:scale(0.97);}
  .qr-card .name{font-size:12px;font-weight:700;margin-top:10px;letter-spacing:1px;}
  .qr-card .hint{font-size:10px;color:rgba(245,200,66,0.5);margin-top:3px;}

  .tip-box{
    margin-top:20px;background:rgba(212,149,10,0.08);
    border:1px solid rgba(212,149,10,0.25);border-radius:10px;
    padding:12px 16px;
  }
  .tip-box p{color:rgba(245,200,66,0.7);font-size:11px;line-height:1.8;letter-spacing:0.5px;}
  .tip-box strong{color:#F5C842;}

  /* ===== CAMERA SCREEN ===== */
  #cam-box{
    position:relative;width:100%;aspect-ratio:3/4;
    background:#000;border-radius:16px;overflow:hidden;
    border:2px solid rgba(212,149,10,0.4);
  }
  #cam-video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1);}
  #frame-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .start-overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.7);gap:12px;
  }
  .start-overlay .frame-name{color:#F5C842;font-size:17px;font-weight:700;letter-spacing:2px;}
  .start-overlay .sub{color:rgba(255,255,255,0.6);font-size:12px;}
  .gold-btn{
    padding:12px 32px;background:linear-gradient(135deg,#D4950A,#F5C842);
    color:#3a1e00;border:none;border-radius:8px;
    font-size:14px;font-weight:700;cursor:pointer;
    font-family:'Noto Serif JP',serif;letter-spacing:1px;
  }
  .gold-btn:active{transform:scale(0.97);}

  #frame-info{color:#F5C842;font-size:12px;text-align:center;margin:10px 0 4px;letter-spacing:1px;opacity:0.8;}

  .btn-row{display:flex;gap:8px;justify-content:center;margin-top:10px;}
  .ghost-btn{
    border:1px solid rgba(212,149,10,0.5);background:transparent;
    color:#F5C842;border-radius:8px;padding:8px 18px;
    font-size:13px;cursor:pointer;font-family:'Noto Serif JP',serif;
    transition:background .15s;
  }
  .ghost-btn:hover{background:rgba(212,149,10,0.1);}

  #snap-btn{
    width:64px;height:64px;border-radius:50%;
    border:3px solid #F5C842;background:rgba(212,149,10,0.15);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    margin:14px auto 0;transition:transform .1s,background .15s;
  }
  #snap-btn:active{transform:scale(0.92);background:rgba(212,149,10,0.3);}

  #preview-area{
    margin-top:14px;background:rgba(255,255,255,0.04);
    border:1px solid rgba(212,149,10,0.3);border-radius:12px;padding:14px;text-align:center;
  }
  #preview-img{width:100%;border-radius:8px;}
  #preview-area .preview-label{color:rgba(245,200,66,0.7);font-size:11px;margin-bottom:10px;letter-spacing:1px;}
  #dl-btn{
    display:inline-block;margin-top:10px;padding:10px 28px;
    background:linear-gradient(135deg,#D4950A,#F5C842);
    color:#3a1e00;font-size:13px;font-weight:700;
    text-decoration:none;border-radius:8px;
    font-family:'Noto Serif JP',serif;letter-spacing:1px;
  }

  footer{color:rgba(245,200,66,0.3);font-size:10px;text-align:center;padding:20px;letter-spacing:1px;}
</style>
</head>
<body>

<header>
  <h1>⛩ OH!まもり ARフレーム</h1>
  <p>2027 最上稲荷 · 期間限定</p>
</header>

<div id="app">

  <div id="screen-top">
    <p class="pick-label">✦ フレームをタップして起動 ✦</p>
    <div id="qr-cards"></div>
    <div class="tip-box" style="margin-top:20px;">
      <p>
        <strong>店舗スタッフの方へ：</strong><br>
        このページのQRコードを印刷して撮影コーナーに設置してください。
        参拝者はQRを読み取ってこのページを開き、フレームをタップするだけでARカメラが起動します。
      </p>
    </div>
  </div>

  <div id="screen-camera" class="hidden">
    <div id="cam-box">
      <div class="start-overlay" id="start-overlay">
        <p class="frame-name" id="frame-ready-name"></p>
        <p class="sub">カメラを起動して撮影しましょう</p>
        <button class="gold-btn" id="start-cam-btn">📷 カメラを起動</button>
      </div>
      <video id="cam-video" autoplay muted playsinline></video>
      <canvas id="frame-canvas"></canvas>
    </div>
    <p id="frame-info"></p>
    <div class="btn-row">
      <button class="ghost-btn" id="back-btn">← フレーム選択に戻る</button>
    </div>
    <button id="snap-btn" title="撮影">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#F5C842" stroke-width="2">
        <circle cx="12" cy="12" r="8"/>
        <circle cx="12" cy="12" r="3.5" fill="#F5C842"/>
      </svg>
    </button>
    <div id="preview-area" class="hidden">
      <p class="preview-label">✦ 撮影完了 ✦</p>
      <img id="preview-img"/>
      <br><a id="dl-btn">📥 写真をダウンロード</a>
    </div>
  </div>

</div>

<footer>期間限定 · 数量限定 · LIMITED EDITION</footer>

<canvas id="snap-canvas" style="display:none;"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const BASE_URL = 'https://miyajikouji0414-sys.github.io/omamori-ar/';

const FRAMES = {
  'wafuu':  { label:'OH!まもり 紫', color:'#c8b4f0', draw:drawWafuu },
  'gold':   { label:'OH!まもり 金', color:'#F5D060', draw:drawGold },
  'sakura': { label:'OH!まもり 青', color:'#90c8ff', draw:drawSakura },
};

let activeKey=null, camStream=null, animId=null;
const camVideo = document.getElementById('cam-video');
const fc = document.getElementById('frame-canvas');
const fctx = fc.getContext('2d');
const sc = document.getElementById('snap-canvas');
const sctx = sc.getContext('2d');

function buildCards(){
  const wrap = document.getElementById('qr-cards');
  Object.entries(FRAMES).forEach(([key, f]) => {
    const card = document.createElement('div');
    card.className = 'qr-card';

    const qDiv = document.createElement('div');
    qDiv.style.cssText = 'width:96px;height:96px;margin:0 auto;background:#fff;border-radius:6px;padding:4px;';
    card.appendChild(qDiv);

    const nm = document.createElement('p');
    nm.className = 'name';
    nm.textContent = f.label;
    nm.style.color = f.color;
    card.appendChild(nm);

    const ht = document.createElement('p');
    ht.className = 'hint';
    ht.textContent = 'QRを印刷して設置';
    card.appendChild(ht);

    wrap.appendChild(card);

    const qrUrl = BASE_URL + '?frame=' + key;
    new QRCode(qDiv, {
      text: qrUrl,
      width: 88, height: 88,
      colorDark: '#222', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    card.addEventListener('click', () => activateFrame(key));
  });
}

function checkURLParam(){
  const params = new URLSearchParams(window.location.search);
  const frame = params.get('frame');
  if(frame && FRAMES[frame]){
    activateFrame(frame);
  }
}

function activateFrame(key){
  activeKey = key;
  document.getElementById('screen-top').classList.add('hidden');
  document.getElementById('screen-camera').classList.remove('hidden');
  document.getElementById('preview-area').classList.add('hidden');
  document.getElementById('frame-ready-name').textContent = FRAMES[key].label;
  document.getElementById('frame-info').textContent = FRAMES[key].label + ' 起動中';
  document.getElementById('start-overlay').style.display = 'flex';
  camVideo.style.display = 'none';
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
}

document.getElementById('start-cam-btn').addEventListener('click', async () => {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false });
    camVideo.srcObject = camStream;
    camVideo.style.display = 'block';
    document.getElementById('start-overlay').style.display = 'none';
    camVideo.onloadedmetadata = () => {
      fc.width = camVideo.videoWidth || 600;
      fc.height = camVideo.videoHeight || 800;
      (function loop(){
        fctx.clearRect(0,0,fc.width,fc.height);
        if(activeKey) FRAMES[activeKey].draw(fctx, fc.width, fc.height, Date.now()/1000);
        animId = requestAnimationFrame(loop);
      })();
    };
  } catch(e) {
    alert('カメラへのアクセスが拒否されました。ブラウザの設定を確認してください。');
  }
});

document.getElementById('back-btn').addEventListener('click', () => {
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  activeKey = null;
  document.getElementById('screen-camera').classList.add('hidden');
  document.getElementById('screen-top').classList.remove('hidden');
});

document.getElementById('snap-btn').addEventListener('click', () => {
  if(!camStream){ alert('先にカメラを起動してください。'); return; }
  const w = camVideo.videoWidth || 600, h = camVideo.videoHeight || 800;
  sc.width = w; sc.height = h;
  sctx.save(); sctx.translate(w,0); sctx.scale(-1,1); sctx.drawImage(camVideo,0,0,w,h); sctx.restore();
  if(activeKey) FRAMES[activeKey].draw(sctx, w, h, Date.now()/1000);
  const url = sc.toDataURL('image/png');
  document.getElementById('preview-img').src = url;
  const dl = document.getElementById('dl-btn');
  dl.href = url; dl.download = 'omamori-ar.png';
  document.getElementById('preview-area').classList.remove('hidden');
});

/* ===== OH!くん ===== */
function drawOHkun(ctx, cx, cy, size, furColor, t){
  ctx.save();
  ctx.translate(cx, cy);
  const s = size;
  const bob = Math.sin(t * 2) * s * 0.03;
  ctx.translate(0, bob);

  // 羊の毛（外側モフモフ）
  const fluffs = 10;
  for(let i = 0; i < fluffs; i++){
    const a = (i / fluffs) * Math.PI * 2;
    const fr = s * 0.52;
    const fx = Math.cos(a) * fr * 0.85;
    const fy = Math.sin(a) * fr * 0.7 - s*0.05;
    const fs = s * (0.22 + 0.06 * Math.sin(i * 2.1));
    ctx.beginPath();
    ctx.arc(fx, fy, fs, 0, Math.PI * 2);
    ctx.fillStyle = furColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,50,20,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 体（白い楕円）
  ctx.beginPath();
  ctx.ellipse(0, s*0.05, s*0.38, s*0.42, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,50,20,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 頭（大きめ白丸）
  ctx.beginPath();
  ctx.arc(0, -s*0.28, s*0.3, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(80,50,20,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 羊の角
  [[-1,1],[1,1]].forEach(([side, _]) => {
    ctx.save();
    ctx.translate(side * s*0.18, -s*0.5);
    ctx.beginPath();
    ctx.arc(side * s*0.05, -s*0.05, s*0.12, Math.PI*0.2, Math.PI*1.5, side<0);
    ctx.strokeStyle = furColor;
    ctx.lineWidth = s*0.07;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();
  });

  // 耳
  [[-1],[1]].forEach(([side]) => {
    ctx.beginPath();
    ctx.ellipse(side * s*0.28, -s*0.3, s*0.09, s*0.14, side*0.4, 0, Math.PI*2);
    ctx.fillStyle = furColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(80,50,20,0.25)'; ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(side * s*0.28, -s*0.3, s*0.05, s*0.08, side*0.4, 0, Math.PI*2);
    ctx.fillStyle = '#f8d0d0';
    ctx.fill();
  });

  // 目（大きな黒丸）
  [[-0.11],[0.11]].forEach(([ex]) => {
    ctx.beginPath();
    ctx.arc(ex*s, -s*0.3, s*0.07, 0, Math.PI*2);
    ctx.fillStyle = '#1a1a2e'; ctx.fill();
    ctx.beginPath();
    ctx.arc(ex*s + s*0.025, -s*0.32, s*0.025, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
  });

  // 鼻
  ctx.beginPath();
  ctx.arc(0, -s*0.19, s*0.04, 0, Math.PI*2);
  ctx.fillStyle = '#1a1a2e'; ctx.fill();

  // 足（黒い丸）
  [[-0.18],[0],[0.18]].forEach(([fx], i) => {
    if(i===1) return;
    ctx.beginPath();
    ctx.arc(fx*s, s*0.42, s*0.1, 0, Math.PI*2);
    ctx.fillStyle = '#1a1a2e'; ctx.fill();
  });
  ctx.beginPath(); ctx.arc(-s*0.12, s*0.44, s*0.1, 0, Math.PI*2); ctx.fillStyle='#1a1a2e'; ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.12, s*0.44, s*0.1, 0, Math.PI*2); ctx.fillStyle='#1a1a2e'; ctx.fill();

  ctx.restore();
}

/* ===== SHARED HELPERS ===== */

function drawAsanoha(ctx, w, h, alpha){
  ctx.save(); ctx.globalAlpha = alpha;
  const s = 22;
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 0.8;
  for(let gy = -s; gy < h + s; gy += s){
    for(let gx = -s; gx < w + s; gx += s){
      for(let d = 0; d < 3; d++){
        const a = (d / 3) * Math.PI;
        ctx.beginPath();
        ctx.moveTo(gx + Math.cos(a)*s*0.5, gy + Math.sin(a)*s*0.5);
        ctx.lineTo(gx - Math.cos(a)*s*0.5, gy - Math.sin(a)*s*0.5);
        ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(gx, gy, s*0.08, 0, Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fill();
    }
  }
  ctx.restore();
}

function drawMizuhikiBow(ctx, cx, cy, r, c1, c2, t){
  ctx.save(); ctx.translate(cx, cy);
  for(let i = 0; i < 8; i++){
    const a = (i/8)*Math.PI*2 + t*0.3;
    const bx = Math.cos(a)*r, by = Math.sin(a)*r*0.45;
    ctx.beginPath(); ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(Math.cos(a+0.4)*r*0.5, Math.sin(a+0.4)*r*0.5, bx, by);
    ctx.strokeStyle = i%2===0 ? c1 : c2;
    ctx.lineWidth = 2; ctx.globalAlpha = 0.9; ctx.stroke(); ctx.globalAlpha=1;
  }
  ctx.beginPath(); ctx.arc(0,0,r*0.1,0,Math.PI*2);
  ctx.fillStyle=c1; ctx.fill();
  ctx.restore();
}

function drawKira(ctx,x,y,sz,color,t,off){
  const p=0.5+0.5*Math.sin(t*3+off), s=sz*p;
  ctx.save(); ctx.translate(x,y); ctx.rotate(t*0.5+off);
  ctx.fillStyle=color; ctx.globalAlpha=p*0.9;
  for(let i=0;i<4;i++){
    const a=(i/4)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
    ctx.lineTo(Math.cos(a+Math.PI/4)*s*0.35, Math.sin(a+Math.PI/4)*s*0.35);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawOmamoriShape(ctx, w, h, fillColor, strokeColor, alpha){
  const pad = 12, r = 18, topCut = h*0.1;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(pad+r, pad);
  ctx.lineTo(w/2 - w*0.12, pad);
  ctx.lineTo(w/2 - w*0.06, pad - topCut*0.3);
  ctx.lineTo(w/2, pad - topCut*0.5);
  ctx.lineTo(w/2 + w*0.06, pad - topCut*0.3);
  ctx.lineTo(w/2 + w*0.12, pad);
  ctx.lineTo(w-pad-r, pad);
  ctx.arcTo(w-pad, pad, w-pad, pad+r, r);
  ctx.lineTo(w-pad, h-pad-r);
  ctx.arcTo(w-pad, h-pad, w-pad-r, h-pad, r);
  ctx.lineTo(pad+r, h-pad);
  ctx.arcTo(pad, h-pad, pad, h-pad-r, r);
  ctx.lineTo(pad, pad+r);
  ctx.arcTo(pad, pad, pad+r, pad, r);
  ctx.closePath();
  ctx.fillStyle = fillColor; ctx.fill();
  ctx.strokeStyle = strokeColor; ctx.lineWidth = 3; ctx.stroke();
  ctx.restore();
}

/* ===== FRAME 1: OH!まもり 紫 ===== */
function drawWafuu(ctx, w, h, t){
  drawOmamoriShape(ctx, w, h, 'rgba(160,130,210,0.82)', 'rgba(200,170,240,0.9)', 1);
  drawAsanoha(ctx, w, h, 0.18);
  ctx.save();
  ctx.beginPath();
  const pad=12,r=18,topCut=h*0.1;
  ctx.moveTo(pad+r,pad); ctx.lineTo(w/2-w*0.12,pad); ctx.lineTo(w/2-w*0.06,pad-topCut*0.3); ctx.lineTo(w/2,pad-topCut*0.5); ctx.lineTo(w/2+w*0.06,pad-topCut*0.3); ctx.lineTo(w/2+w*0.12,pad); ctx.lineTo(w-pad-r,pad); ctx.arcTo(w-pad,pad,w-pad,pad+r,r); ctx.lineTo(w-pad,h-pad-r); ctx.arcTo(w-pad,h-pad,w-pad-r,h-pad,r); ctx.lineTo(pad+r,h-pad); ctx.arcTo(pad,h-pad,pad,h-pad-r,r); ctx.lineTo(pad,pad+r); ctx.arcTo(pad,pad,pad+r,pad,r); ctx.closePath();
  ctx.clip();
  drawAsanoha(ctx, w, h, 0.22);
  ctx.restore();
  drawMizuhikiBow(ctx, w/2, h*0.10, w*0.18, '#ffffff', '#a0c4ff', t);
  drawMizuhikiBow(ctx, w*0.12, h*0.5, w*0.10, '#ffffff', '#c8b4f0', t+1);
  drawMizuhikiBow(ctx, w*0.88, h*0.5, w*0.10, '#ffffff', '#a0c4ff', t+2);
  drawMizuhikiBow(ctx, w/2, h*0.92, w*0.12, '#c8b4f0', '#ffffff', t+1.5);
  const kpts = [[w*0.15,h*0.06,8,'#fff'],[w*0.85,h*0.06,7,'#c8b4f0'],[w*0.08,h*0.94,7,'#fff'],[w*0.92,h*0.94,8,'#a0c4ff'],[w*0.5,h*0.03,6,'#fff'],[w*0.5,h*0.97,6,'#c8b4f0'],[w*0.05,h*0.35,5,'#fff'],[w*0.95,h*0.35,5,'#a0c4ff'],[w*0.05,h*0.65,5,'#c8b4f0'],[w*0.95,h*0.65,5,'#fff']];
  kpts.forEach(([kx,ky,ks,kc],i)=>drawKira(ctx,kx,ky,ks,kc,t,i*1.2));
  // OH!くん（左下・右下に小さく）
  drawOHkun(ctx, w*0.18, h*0.78, w*0.16, '#c8a878', t);
  drawOHkun(ctx, w*0.82, h*0.78, w*0.16, '#b09060', t+0.5);

  ctx.save();
  ctx.font=`bold ${Math.round(w*0.055)}px 'Noto Serif JP',serif`;
  ctx.fillStyle='#ffffff'; ctx.textAlign='center'; ctx.shadowColor='rgba(100,60,180,0.5)'; ctx.shadowBlur=4;
  ctx.fillText('OH!まもり', w/2, h*0.22);
  ctx.font=`${Math.round(w*0.034)}px 'Noto Serif JP',serif`;
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.shadowBlur=0;
  ctx.fillText('2027 最上稲荷', w/2, h*0.91);
  ctx.restore();
}

/* ===== FRAME 2: 紫×金 豪華版 ===== */
function drawGold(ctx, w, h, t){
  drawOmamoriShape(ctx, w, h, 'rgba(130,100,190,0.85)', 'rgba(220,190,80,0.95)', 1);
  ctx.save();
  const pad=12,r=18,topCut=h*0.1;
  ctx.beginPath();

  ctx.fillStyle='rgba(245,208,96,0.85)';
  ctx.fillText('2027 最上稲荷', w/2, h*0.92);

}
