<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お守りARフレーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#1a0a00;min-height:100vh;font-family:'Noto Serif JP',serif;display:flex;flex-direction:column;align-items:center;}

  header{width:100%;max-width:480px;padding:16px;text-align:center;border-bottom:1px solid rgba(212,149,10,0.3);}
  header h1{color:#F5C842;font-size:18px;font-weight:700;letter-spacing:3px;}
  header p{color:rgba(245,200,66,0.6);font-size:11px;margin-top:4px;letter-spacing:1px;}

  #app{width:100%;max-width:480px;padding:16px;}
  .hidden{display:none!important;}

  /* ===== TOP SCREEN ===== */
  #screen-top{}
  .pick-label{color:#F5C842;font-size:13px;text-align:center;letter-spacing:2px;margin-bottom:14px;opacity:0.85;}
  #qr-cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .qr-card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(212,149,10,0.4);
    border-radius:12px;padding:14px 10px;
    text-align:center;cursor:pointer;
    transition:border-color .2s, background .2s;
    width:130px;
  }
  .qr-card:hover{border-color:#F5C842;background:rgba(212,149,10,0.08);}
  .qr-card:active{transform:scale(0.97);}
  .qr-card .name{font-size:12px;font-weight:700;margin-top:10px;letter-spacing:1px;}
  .qr-card .hint{font-size:10px;color:rgba(245,200,66,0.5);margin-top:3px;}

  .tip-box{
    margin-top:20px;background:rgba(212,149,10,0.08);
    border:1px solid rgba(212,149,10,0.25);border-radius:10px;
    padding:12px 16px;
  }
  .tip-box p{color:rgba(245,200,66,0.7);font-size:11px;line-height:1.8;letter-spacing:0.5px;}
  .tip-box strong{color:#F5C842;}

  /* ===== CAMERA SCREEN ===== */
  #cam-box{
    position:relative;width:100%;aspect-ratio:3/4;
    background:#000;border-radius:16px;overflow:hidden;
    border:2px solid rgba(212,149,10,0.4);
  }
  #cam-video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1);}
  #frame-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .start-overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,0.7);gap:12px;
  }
  .start-overlay .frame-name{color:#F5C842;font-size:17px;font-weight:700;letter-spacing:2px;}
  .start-overlay .sub{color:rgba(255,255,255,0.6);font-size:12px;}
  .gold-btn{
    padding:12px 32px;background:linear-gradient(135deg,#D4950A,#F5C842);
    color:#3a1e00;border:none;border-radius:8px;
    font-size:14px;font-weight:700;cursor:pointer;
    font-family:'Noto Serif JP',serif;letter-spacing:1px;
  }
  .gold-btn:active{transform:scale(0.97);}

  #frame-info{color:#F5C842;font-size:12px;text-align:center;margin:10px 0 4px;letter-spacing:1px;opacity:0.8;}

  .btn-row{display:flex;gap:8px;justify-content:center;margin-top:10px;}
  .ghost-btn{
    border:1px solid rgba(212,149,10,0.5);background:transparent;
    color:#F5C842;border-radius:8px;padding:8px 18px;
    font-size:13px;cursor:pointer;font-family:'Noto Serif JP',serif;
    transition:background .15s;
  }
  .ghost-btn:hover{background:rgba(212,149,10,0.1);}

  #snap-btn{
    width:64px;height:64px;border-radius:50%;
    border:3px solid #F5C842;background:rgba(212,149,10,0.15);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    margin:14px auto 0;transition:transform .1s,background .15s;
  }
  #snap-btn:active{transform:scale(0.92);background:rgba(212,149,10,0.3);}

  #preview-area{
    margin-top:14px;background:rgba(255,255,255,0.04);
    border:1px solid rgba(212,149,10,0.3);border-radius:12px;padding:14px;text-align:center;
  }
  #preview-img{width:100%;border-radius:8px;}
  #preview-area .preview-label{color:rgba(245,200,66,0.7);font-size:11px;margin-bottom:10px;letter-spacing:1px;}
  #dl-btn{
    display:inline-block;margin-top:10px;padding:10px 28px;
    background:linear-gradient(135deg,#D4950A,#F5C842);
    color:#3a1e00;font-size:13px;font-weight:700;
    text-decoration:none;border-radius:8px;
    font-family:'Noto Serif JP',serif;letter-spacing:1px;
  }

  footer{color:rgba(245,200,66,0.3);font-size:10px;text-align:center;padding:20px;letter-spacing:1px;}
</style>
</head>
<body>

<header>
  <h1>⛩ OH!まもり ARフレーム</h1>
  <p>2027 最上稲荷 · 期間限定</p>
</header>

<div id="app">

  <div id="screen-top">
    <p class="pick-label">✦ フレームをタップして起動 ✦</p>
    <div id="qr-cards"></div>
    <div class="tip-box" style="margin-top:20px;">
      <p>
        <strong>店舗スタッフの方へ：</strong><br>
        このページのQRコードを印刷して撮影コーナーに設置してください。
        参拝者はQRを読み取ってこのページを開き、フレームをタップするだけでARカメラが起動します。
      </p>
    </div>
  </div>

  <div id="screen-camera" class="hidden">
    <div id="cam-box">
      <div class="start-overlay" id="start-overlay">
        <p class="frame-name" id="frame-ready-name"></p>
        <p class="sub">カメラを起動して撮影しましょう</p>
        <button class="gold-btn" id="start-cam-btn">📷 カメラを起動</button>
      </div>
      <video id="cam-video" autoplay muted playsinline></video>
      <canvas id="frame-canvas"></canvas>
    </div>
    <p id="frame-info"></p>
    <div class="btn-row">
      <button class="ghost-btn" id="back-btn">← フレーム選択に戻る</button>
    </div>
    <button id="snap-btn" title="撮影">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#F5C842" stroke-width="2">
        <circle cx="12" cy="12" r="8"/>
        <circle cx="12" cy="12" r="3.5" fill="#F5C842"/>
      </svg>
    </button>
    <div id="preview-area" class="hidden">
      <p class="preview-label">✦ 撮影完了 ✦</p>
      <img id="preview-img"/>
      <br><a id="dl-btn">📥 写真をダウンロード</a>
    </div>
  </div>

</div>

<footer>期間限定 · 数量限定 · LIMITED EDITION</footer>

<canvas id="snap-canvas" style="display:none;"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const BASE_URL = 'https://miyajikouji0414-sys.github.io/omamori-ar/';

const FRAMES = {
  'wafuu':  { label:'お正月 白×金', color:'#C8A000', draw:drawWafuu },
  'gold':   { label:'お正月 白×金豪華', color:'#D4A800', draw:drawGold },
  'sakura': { label:'お正月 白×紫', color:'#9070C0', draw:drawSakura },
};

let activeKey=null, camStream=null, animId=null;
const camVideo = document.getElementById('cam-video');
const fc = document.getElementById('frame-canvas');
const fctx = fc.getContext('2d');
const sc = document.getElementById('snap-canvas');
const sctx = sc.getContext('2d');

function buildCards(){
  const wrap = document.getElementById('qr-cards');
  Object.entries(FRAMES).forEach(([key, f]) => {
    const card = document.createElement('div');
    card.className = 'qr-card';

    const qDiv = document.createElement('div');
    qDiv.style.cssText = 'width:96px;height:96px;margin:0 auto;background:#fff;border-radius:6px;padding:4px;';
    card.appendChild(qDiv);

    const nm = document.createElement('p');
    nm.className = 'name';
    nm.textContent = f.label;
    nm.style.color = f.color;
    card.appendChild(nm);

    const ht = document.createElement('p');
    ht.className = 'hint';
    ht.textContent = 'QRを印刷して設置';
    card.appendChild(ht);

    wrap.appendChild(card);

    const qrUrl = BASE_URL + '?frame=' + key;
    new QRCode(qDiv, {
      text: qrUrl,
      width: 88, height: 88,
      colorDark: '#222', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    card.addEventListener('click', () => activateFrame(key));
  });
}

function checkURLParam(){
  const params = new URLSearchParams(window.location.search);
  const frame = params.get('frame');
  if(frame && FRAMES[frame]){
    activateFrame(frame);
  }
}

function activateFrame(key){
  activeKey = key;
  document.getElementById('screen-top').classList.add('hidden');
  document.getElementById('screen-camera').classList.remove('hidden');
  document.getElementById('preview-area').classList.add('hidden');
  document.getElementById('frame-ready-name').textContent = FRAMES[key].label;
  document.getElementById('frame-info').textContent = FRAMES[key].label + ' 起動中';
  document.getElementById('start-overlay').style.display = 'flex';
  camVideo.style.display = 'none';
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
}

document.getElementById('start-cam-btn').addEventListener('click', async () => {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false });
    camVideo.srcObject = camStream;
    camVideo.style.display = 'block';
    document.getElementById('start-overlay').style.display = 'none';
    camVideo.onloadedmetadata = () => {
      fc.width = camVideo.videoWidth || 600;
      fc.height = camVideo.videoHeight || 800;
      (function loop(){
        fctx.clearRect(0,0,fc.width,fc.height);
        if(activeKey) FRAMES[activeKey].draw(fctx, fc.width, fc.height, Date.now()/1000);
        animId = requestAnimationFrame(loop);
      })();
    };
  } catch(e) {
    alert('カメラへのアクセスが拒否されました。ブラウザの設定を確認してください。');
  }
});

document.getElementById('back-btn').addEventListener('click', () => {
  if(animId){ cancelAnimationFrame(animId); animId=null; }
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  activeKey = null;
  document.getElementById('screen-camera').classList.add('hidden');
  document.getElementById('screen-top').classList.remove('hidden');
});

document.getElementById('snap-btn').addEventListener('click', () => {
  if(!camStream){ alert('先にカメラを起動してください。'); return; }
  const w = camVideo.videoWidth || 600, h = camVideo.videoHeight || 800;
  sc.width = w; sc.height = h;
  sctx.save(); sctx.translate(w,0); sctx.scale(-1,1); sctx.drawImage(camVideo,0,0,w,h); sctx.restore();
  if(activeKey) FRAMES[activeKey].draw(sctx, w, h, Date.now()/1000);
  const url = sc.toDataURL('image/png');
  document.getElementById('preview-img').src = url;
  const dl = document.getElementById('dl-btn');
  dl.href = url; dl.download = 'omamori-ar.png';
  document.getElementById('preview-area').classList.remove('hidden');
});

/* ===== OH!くん（画像イメージ：白いモフモフ羊、金の角、赤ほっぺ） ===== */
function drawOHkun(ctx, cx, cy, size, t){
  ctx.save();
  ctx.translate(cx, cy);
  const s = size;
  const bob = Math.sin(t*2)*s*0.025;
  ctx.translate(0, bob);

  // モフモフ外毛（クリーム色の毛玉たくさん）
  const fluffPos = [
    [-0.38,-0.15,0.22],[0.38,-0.15,0.22],
    [-0.28,-0.38,0.2],[0.28,-0.38,0.2],
    [0,-0.48,0.2],
    [-0.18,-0.55,0.17],[0.18,-0.55,0.17],
    [-0.42,0.05,0.2],[0.42,0.05,0.2],
    [-0.32,0.2,0.18],[0.32,0.2,0.18],
    [0,0.28,0.19],
  ];
  fluffPos.forEach(([fx,fy,fr])=>{
    ctx.beginPath();
    ctx.arc(fx*s, fy*s, fr*s, 0, Math.PI*2);
    ctx.fillStyle='#f5f0e0';
    ctx.fill();
    ctx.strokeStyle='rgba(180,160,100,0.3)'; ctx.lineWidth=0.8; ctx.stroke();
  });

  // 体（白い大きな楕円）
  ctx.beginPath();
  ctx.ellipse(0, s*0.08, s*0.32, s*0.38, 0, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='rgba(150,130,80,0.35)'; ctx.lineWidth=1.5; ctx.stroke();

  // 頭（白い丸）
  ctx.beginPath();
  ctx.arc(0, -s*0.3, s*0.28, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='rgba(150,130,80,0.35)'; ctx.lineWidth=1.5; ctx.stroke();

  // 金の角（渦巻き）
  [-1,1].forEach(side=>{
    ctx.save();
    ctx.translate(side*s*0.15, -s*0.52);
    ctx.beginPath();
    ctx.arc(side*s*0.08, 0, s*0.13, side>0?Math.PI*1.1:Math.PI*0.1, side>0?Math.PI*0.1:Math.PI*1.1, side>0);
    ctx.strokeStyle='#C8A000'; ctx.lineWidth=s*0.075; ctx.lineCap='round'; ctx.stroke();
    ctx.beginPath();
    ctx.arc(side*s*0.08, 0, s*0.07, side>0?Math.PI*1.2:Math.PI*0.0, side>0?Math.PI*0.2:Math.PI*1.0, side>0);
    ctx.strokeStyle='#E8C000'; ctx.lineWidth=s*0.04; ctx.stroke();
    ctx.restore();
  });

  // 耳
  [-1,1].forEach(side=>{
    ctx.beginPath();
    ctx.ellipse(side*s*0.3, -s*0.32, s*0.09, s*0.13, side*0.35, 0, Math.PI*2);
    ctx.fillStyle='#f5f0e0'; ctx.fill();
    ctx.strokeStyle='rgba(150,130,80,0.3)'; ctx.lineWidth=1; ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(side*s*0.3, -s*0.32, s*0.05, s*0.075, side*0.35, 0, Math.PI*2);
    ctx.fillStyle='#f0c8c0'; ctx.fill();
  });

  // 目（大きな黒目、かわいい）
  [-0.11,0.11].forEach(ex=>{
    ctx.beginPath(); ctx.arc(ex*s, -s*0.32, s*0.075, 0, Math.PI*2);
    ctx.fillStyle='#1a1020'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex*s+s*0.03, -s*0.345, s*0.028, 0, Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
  });

  // ほっぺ（赤いまる）
  [-0.18,0.18].forEach(ex=>{
    ctx.beginPath(); ctx.arc(ex*s, -s*0.22, s*0.07, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,150,130,0.55)'; ctx.fill();
  });

  // 鼻（小さいY字）
  ctx.beginPath(); ctx.arc(0, -s*0.2, s*0.035, 0, Math.PI*2);
  ctx.fillStyle='#b08080'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,-s*0.165); ctx.lineTo(-s*0.03,-s*0.13); ctx.moveTo(0,-s*0.165); ctx.lineTo(s*0.03,-s*0.13);
  ctx.strokeStyle='#b08080'; ctx.lineWidth=s*0.025; ctx.lineCap='round'; ctx.stroke();

  // 足（黒い丸2つ）
  [-0.14,0.14].forEach(fx=>{
    ctx.beginPath(); ctx.arc(fx*s, s*0.43, s*0.1, 0, Math.PI*2);
    ctx.fillStyle='#1a1020'; ctx.fill();
  });

  ctx.restore();
}

/* ===== 霞（金の雲） ===== */
function drawKasumi(ctx, x, y, w2, color, alpha){
  ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=color;
  const h2=w2*0.35;
  [0,w2*0.25,w2*0.5,w2*0.75,w2].forEach((dx,i)=>{
    const r=h2*(0.6+0.4*Math.sin(i*1.3));
    ctx.beginPath(); ctx.ellipse(x+dx, y, r*1.1, r, 0, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

/* ===== 竹 ===== */
function drawTake(ctx, x, y, h2, w2, color){
  ctx.save();
  const seg=5;
  for(let i=0;i<seg;i++){
    const sy=y+i*(h2/seg);
    ctx.beginPath();
    ctx.roundRect(x-w2/2, sy, w2, h2/seg-2, 3);
    ctx.fillStyle=i%2===0?color:'#3a7a30'; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.5; ctx.stroke();
  }
  // 節
  for(let i=1;i<seg;i++){
    ctx.beginPath();
    ctx.moveTo(x-w2/2-2, y+i*(h2/seg));
    ctx.lineTo(x+w2/2+2, y+i*(h2/seg));
    ctx.strokeStyle='#2a6020'; ctx.lineWidth=2; ctx.stroke();
  }
  ctx.restore();
}

/* ===== 梅の花 ===== */
function drawUme(ctx, x, y, r, color){
  ctx.save(); ctx.translate(x,y);
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2-Math.PI/2;
    ctx.beginPath();
    ctx.arc(Math.cos(a)*r*0.55, Math.sin(a)*r*0.55, r*0.42, 0, Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=0.5; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(0,0,r*0.25,0,Math.PI*2);
  ctx.fillStyle='#FFE066'; ctx.fill();
  ctx.restore();
}

/* ===== しめ縄 ===== */
function drawShimenawa(ctx, x, y, w2, t){
  ctx.save();
  const thick=w2*0.09;
  ctx.strokeStyle='#d4b870'; ctx.lineWidth=thick; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w2,y); ctx.stroke();
  ctx.strokeStyle='#b89040'; ctx.lineWidth=thick*0.4;
  for(let i=0;i<8;i++){
    const sx=x+i*(w2/7);
    ctx.beginPath(); ctx.moveTo(sx,y-thick*0.3); ctx.lineTo(sx+w2/14,y+thick*0.3); ctx.stroke();
  }
  // 垂れ飾り（中央）
  ctx.strokeStyle='#d4b870'; ctx.lineWidth=thick*0.5;
  [-w2*0.15,0,w2*0.15].forEach((dx,i)=>{
    ctx.beginPath(); ctx.moveTo(x+w2/2+dx, y+thick*0.3);
    ctx.lineTo(x+w2/2+dx, y+thick*0.3+w2*0.12+i*4);
    ctx.stroke();
    if(i===1){
      ctx.beginPath(); ctx.arc(x+w2/2+dx, y+thick*0.3+w2*0.12+i*4, w2*0.06,0,Math.PI*2);
      ctx.fillStyle='#d4b870'; ctx.fill();
    }
  });
  ctx.restore();
}

/* ===== きらきら ===== */
function drawKira(ctx,x,y,sz,color,t,off){
  const p=0.5+0.5*Math.sin(t*3+off), s=sz*p;
  ctx.save(); ctx.translate(x,y); ctx.rotate(t*0.5+off);
  ctx.fillStyle=color; ctx.globalAlpha=p*0.9;
  for(let i=0;i<4;i++){
    const a=(i/4)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);
    ctx.lineTo(Math.cos(a+Math.PI/4)*s*0.35,Math.sin(a+Math.PI/4)*s*0.35);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.restore();
}

function drawUme(ctx, x, y, r, color){
  ctx.save(); ctx.translate(x,y);
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2-Math.PI/2;

/* ===== しめ縄 ===== */
function drawShimenawa(ctx, x, y, w2){
  ctx.save();
  const thick=w2*0.06;
  ctx.strokeStyle='#d4b870'; ctx.lineWidth=thick; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w2,y); ctx.stroke();
  ctx.strokeStyle='#b89040'; ctx.lineWidth=thick*0.35;
  for(let i=0;i<10;i++){
    const sx=x+i*(w2/9);
    ctx.beginPath(); ctx.moveTo(sx,y-thick*0.3); ctx.lineTo(sx+w2/18,y+thick*0.3); ctx.stroke();
  }
  ctx.restore();
}

/* ===== 共通フレーム描画（枠のみ・中央透明） ===== */
function drawMainFrame(ctx, w, h, t, cfg){
  const bh = h*0.18; // 上下帯の高さ

  // 上帯（半透明）
  ctx.fillStyle=cfg.bg;
  ctx.fillRect(0, 0, w, bh);

  // 下帯（半透明）
  ctx.fillRect(0, h-bh, w, bh);

  // 左右細帯
  ctx.fillStyle=cfg.bgSide;
  ctx.fillRect(0, bh, w*0.12, h-bh*2);
  ctx.fillRect(w-w*0.12, bh, w*0.12, h-bh*2);

  // 上帯：霞＋竹＋梅
  drawKasumi(ctx, -w*0.05, bh*0.45, w*0.45, cfg.goldColor, 0.7);
  drawKasumi(ctx, w*0.5, bh*0.35, w*0.55, cfg.goldColor, 0.65);
  drawTake(ctx, w*0.08, -bh*0.1, bh*1.1, w*0.048, '#4a9040');
  drawTake(ctx, w*0.15, -bh*0.2, bh*1.2, w*0.036, '#3a8030');
  drawTake(ctx, w*0.92, -bh*0.1, bh*1.1, w*0.048, '#4a9040');
  drawTake(ctx, w*0.85, -bh*0.2, bh*1.2, w*0.036, '#3a8030');
  drawUme(ctx, w*0.28, bh*0.55, w*0.055, '#fff');
  drawUme(ctx, w*0.72, bh*0.55, w*0.055, '#ffb0b0');

  // 下帯：しめ縄＋霞
  drawShimenawa(ctx, w*0.05, h-bh*0.62, w*0.9);
  drawKasumi(ctx, -w*0.05, h-bh*0.2, w*0.4, cfg.goldColor, 0.6);
  drawKasumi(ctx, w*0.5, h-bh*0.15, w*0.55, cfg.goldColor, 0.55);

  // 左右帯：梅＋霞
  drawUme(ctx, w*0.06, h*0.38, w*0.045, '#fff');
  drawUme(ctx, w*0.06, h*0.62, w*0.04, '#ffb0b0');
  drawUme(ctx, w*0.94, h*0.38, w*0.045, '#ffb0b0');
  drawUme(ctx, w*0.94, h*0.62, w*0.04, '#fff');

  // きらきら
  [[w*0.35,bh*0.5,8],[w*0.65,bh*0.5,7],[w*0.5,bh*0.3,9],
   [w*0.2,bh*0.7,6],[w*0.8,bh*0.7,6],
   [w*0.06,h*0.5,6],[w*0.94,h*0.5,6],
   [w*0.3,h-bh*0.5,7],[w*0.7,h-bh*0.5,7]
  ].forEach(([kx,ky,ks],i)=>drawKira(ctx,kx,ky,ks,cfg.goldColor,t,i*1.1));

  // 枠線
  ctx.strokeStyle=cfg.borderColor; ctx.lineWidth=3; ctx.strokeRect(4,4,w-8,h-8);
  ctx.strokeStyle=cfg.borderColor2; ctx.lineWidth=1; ctx.strokeRect(10,10,w-20,h-20);

  // テキスト（上帯）
  ctx.save();
  ctx.textAlign='center';
  ctx.font=`bold ${Math.round(w*0.065)}px 'Noto Serif JP',serif`;
  ctx.fillStyle=cfg.textColor;
  ctx.fillText('謹賀新年', w/2, bh*0.55);
  ctx.font=`bold ${Math.round(w*0.04)}px 'Noto Serif JP',serif`;
  ctx.fillStyle=cfg.subColor;
  ctx.fillText('２０２７年', w/2, bh*0.85);

  // テキスト（下帯）
  ctx.font=`${Math.round(w*0.032)}px 'Noto Serif JP',serif`;
  ctx.fillStyle=cfg.subColor;
  ctx.fillText('最上稲荷 · OH!まもり', w/2, h-bh*0.18);
  ctx.restore();
}

function drawWafuu(ctx,w,h,t){
  drawMainFrame(ctx,w,h,t,{
    bg:'rgba(248,245,228,0.92)', bgSide:'rgba(248,245,228,0.75)',
    goldColor:'#C8A000', borderColor:'#C8A000', borderColor2:'rgba(200,160,0,0.5)',
    textColor:'#5a3000', subColor:'#8a5000'
  });
}
function drawGold(ctx,w,h,t){
  drawMainFrame(ctx,w,h,t,{
    bg:'rgba(255,250,225,0.93)', bgSide:'rgba(255,250,225,0.76)',
    goldColor:'#D4A800', borderColor:'#D4A800', borderColor2:'rgba(220,180,0,0.5)',

  });
}

    bg:'rgba(240,235,255,0.92)', bgSide:'rgba(240,235,255,0.75)',
    goldColor:'#9070C0', borderColor:'#8060B0', borderColor2:'rgba(140,100,200,0.5)',
    textColor:'#2a0050', subColor:'#5a3090'
  });
}
